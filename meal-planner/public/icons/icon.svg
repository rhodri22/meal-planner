<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#B83F2A"/>

  <!-- Fork (left, centered at x=185) -->
  <!-- 3 tines -->
  <rect x="162" y="108" width="11" height="96" rx="5.5" fill="white"/>
  <rect x="179" y="108" width="11" height="96" rx="5.5" fill="white"/>
  <rect x="196" y="108" width="11" height="96" rx="5.5" fill="white"/>
  <!-- Tine connector -->
  <rect x="162" y="194" width="45" height="14" rx="4" fill="white"/>
  <!-- Fork handle -->
  <rect x="176" y="203" width="17" height="202" rx="8" fill="white"/>

  <!-- Spoon (right, centered at x=327) -->
